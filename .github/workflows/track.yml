name: 📊 Track Scrimba Progress

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2        # Previous commit bhi chahiye diff ke liye

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install -r tracking/requirements.txt

      - name: Get changed files
        id: changed
        run: |
          CHANGED=$(git diff HEAD~1 HEAD --name-only | grep -v '^tracking/' | grep -v '^\.github/' || true)
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed files:"
          echo "$CHANGED"

      - name: Run tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: python tracking/main.py

      - name: Push results.json to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracking/results.json
          git diff --staged --quiet || git commit -m "🤖 Auto: update results.json [skip ci]"
          git push

      - name: Notify AppScript (Sheet turant update)
        env:
          APPSCRIPT_URL: ${{ secrets.APPSCRIPT_URL }}
        run: |
          if [ -n "$APPSCRIPT_URL" ]; then
            curl -L "$APPSCRIPT_URL" \
              -o /tmp/response.json \
              --silent --max-time 30
            echo "AppScript response:"
            cat /tmp/response.json
          else
            echo "APPSCRIPT_URL secret nahi mila — skip"
          fi
